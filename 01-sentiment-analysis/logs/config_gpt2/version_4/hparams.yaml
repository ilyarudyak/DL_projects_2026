  learning_rate: 0.001
  max_seq_length: 500
  max_vocab_size: 1000
  monitor_metric: val_loss
  num_layers: 2
  patience: 25
  pretrained_tokenizer: gpt2
  tokenizer_path: datasets/tokenizers/
  weight_decay: 0.01
num_classes: 2
