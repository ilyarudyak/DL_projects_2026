config: !!python/object:dataset.IMDBConfig
  batch_size: 512
  checkpoint_dir: checkpoints/
  data_path: datasets/imdb
  dropout: 0.4
  embedding_dim: 128
  epochs: 25
  gradient_clip_val: 1.0
